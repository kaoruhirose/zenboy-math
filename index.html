<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="然BOY算数">
<meta name="theme-color" content="#ff8a3a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<title>然BOY おもしろ算数</title>
<style>
  :root{
    --bg1:#fff7e6; --bg2:#ffe0c2;
    --ink:#3a2b1a; --sub:#8a6d4f;
    --pink:#ff7aa2; --blue:#4cc3ff; --green:#4cd07a; --yellow:#ffd33d; --purple:#a87bff; --orange:#ff8a3a;
    --card:#ffffff; --shadow:0 12px 28px rgba(120,70,20,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:-apple-system,"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN",sans-serif;
    color:var(--ink);
    background:radial-gradient(120% 120% at 50% 0%, var(--bg1), var(--bg2));
    overflow:hidden; user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }
  #app{height:100%; display:flex; align-items:center; justify-content:center; padding:calc(env(safe-area-inset-top) + 8px) 14px 14px;}
  .screen{width:100%; max-width:700px; max-height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch;
    display:none; flex-direction:column; align-items:center; text-align:center;}
  .screen.on{display:flex; animation:pop .32s ease;}
  @keyframes pop{from{opacity:0; transform:scale(.97) translateY(8px);} to{opacity:1; transform:none;}}

  /* Zenboy */
  .zen{flex:none; filter:drop-shadow(0 8px 12px rgba(120,70,20,.2));}
  .zen.bob{animation:bob 2.2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-10px) rotate(2deg);}}

  h1{font-size:28px; margin:12px 0 2px; letter-spacing:1px;}
  .tag{color:var(--sub); font-size:15px; margin:0 0 18px;}
  .speech{position:relative; background:var(--card); border-radius:22px; padding:14px 18px;
    box-shadow:var(--shadow); font-size:18px; line-height:1.6; max-width:520px; margin:6px 0 18px;}
  .speech:after{content:""; position:absolute; top:-12px; left:50%; transform:translateX(-50%);
    border:12px solid transparent; border-bottom-color:var(--card); border-top:0;}

  .btn{border:0; border-radius:999px; padding:16px 30px; font-size:20px; font-weight:800; color:#fff;
    background:linear-gradient(180deg,#ff9a5a,#ff7a3a); box-shadow:var(--shadow); cursor:pointer;
    transition:transform .08s; font-family:inherit; margin:5px;}
  .btn:active{transform:scale(.94);}
  .btn.ghost{background:#fff; color:var(--sub); box-shadow:0 4px 12px rgba(120,70,20,.12); font-size:15px; padding:11px 20px;}
  .btn.sm{font-size:16px; padding:11px 20px;}

  /* HUD */
  .hud{width:100%; max-width:560px; display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .hud .pillstat{background:#fff; border-radius:999px; padding:7px 14px; font-weight:800; box-shadow:0 4px 12px rgba(120,70,20,.12); font-size:15px;}
  .hud .lv{color:var(--purple);}
  .hud .st{color:#e8920a;}

  /* zone map */
  .zones{display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; max-width:560px; margin:8px 0 10px;}
  .zone{position:relative; border:0; border-radius:22px; padding:18px 12px 16px; background:var(--card);
    box-shadow:var(--shadow); cursor:pointer; transition:transform .08s; font-family:inherit; color:var(--ink); text-align:center;}
  .zone:active{transform:scale(.96);}
  .zone .zic{font-size:42px; line-height:1;}
  .zone .znm{font-weight:800; font-size:18px; margin-top:6px;}
  .zone .zsub{font-size:12px; color:var(--sub);}
  .zone .zstars{font-size:12px; color:#e8920a; font-weight:800; margin-top:4px;}
  .zone.diag{grid-column:1 / -1; background:linear-gradient(180deg,#fff,#fff4e6);}
  .zone.rec:after{content:"おすすめ"; position:absolute; right:-6px; top:-12px; background:var(--pink); color:#fff;
    font-size:12px; font-weight:800; padding:4px 12px; border-radius:999px; transform:rotate(6deg); box-shadow:var(--shadow);}

  /* progress bar */
  .top{width:100%; max-width:560px; display:flex; align-items:center; gap:10px; margin-bottom:6px;}
  .bar{flex:1; height:14px; background:#fff; border-radius:999px; overflow:hidden; box-shadow:inset 0 2px 4px rgba(120,70,20,.12);}
  .fill{height:100%; width:0; background:linear-gradient(90deg,var(--yellow),var(--pink)); transition:width .4s;}
  .stagepill{font-size:14px; font-weight:800; color:#fff; padding:6px 12px; border-radius:999px; background:var(--purple);}

  .q{font-size:clamp(30px,8vw,50px); font-weight:800; margin:8px 0 4px; min-height:56px; display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap;}
  .qhint{color:var(--sub); font-size:16px; margin:0 0 16px; min-height:20px;}

  .opts{display:grid; grid-template-columns:1fr 1fr; gap:13px; width:100%; max-width:520px;}
  .opt{border:0; border-radius:20px; padding:22px 10px; font-size:30px; font-weight:800; color:var(--ink);
    background:var(--card); box-shadow:var(--shadow); cursor:pointer; transition:transform .08s; font-family:inherit;}
  .opt:active{transform:scale(.95);}
  .opt.good{background:var(--green); color:#fff; animation:sg .4s;}
  .opt.bad{background:#ff6b6b; color:#fff; animation:sb .4s;}
  @keyframes sg{0%,100%{transform:none;}50%{transform:scale(1.08);}}
  @keyframes sb{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

  /* number tile grid for games */
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(58px,1fr)); gap:10px; width:100%; max-width:560px; margin:6px auto 10px;}
  .tile{aspect-ratio:1/1; border:0; border-radius:16px; background:var(--card); box-shadow:var(--shadow);
    font-size:24px; font-weight:800; color:var(--ink); cursor:pointer; transition:transform .08s; font-family:inherit;
    display:flex; align-items:center; justify-content:center;}
  .tile:active{transform:scale(.92);}
  .tile.hit{background:var(--green); color:#fff; animation:sg .35s;}
  .tile.miss{background:#ff6b6b; color:#fff; animation:sb .35s;}
  .tile.dim{opacity:.35;}

  .float{position:fixed; font-size:32px; pointer-events:none; animation:fu 1s ease forwards; z-index:50;}
  @keyframes fu{from{opacity:1; transform:translateY(0) scale(1);}to{opacity:0; transform:translateY(-90px) scale(1.6);}}

  .lives{font-size:20px; letter-spacing:2px;}
  .streak{font-weight:800; color:var(--orange); font-size:16px; min-height:20px;}

  /* result map */
  .map{display:flex; flex-direction:column; gap:11px; width:100%; max-width:520px; margin:8px 0 16px;}
  .node{display:flex; align-items:center; gap:14px; background:var(--card); border-radius:18px; padding:12px 14px; box-shadow:var(--shadow); text-align:left;}
  .node .ic{font-size:28px; width:44px; height:44px; display:flex; align-items:center; justify-content:center; background:var(--bg1); border-radius:12px; flex:none;}
  .node .nm{font-weight:800; font-size:17px;}
  .node .sc{font-size:13px; color:var(--sub);}
  .node.start{outline:4px solid var(--pink); position:relative;}
  .node.start:after{content:"スタート"; position:absolute; right:-6px; top:-13px; background:var(--pink); color:#fff; font-size:12px; font-weight:800; padding:4px 12px; border-radius:999px; transform:rotate(6deg);}
  .meter{flex:1; height:10px; background:#f0e6da; border-radius:999px; overflow:hidden;}
  .meter > i{display:block; height:100%; border-radius:999px;}
  .small{font-size:12px; color:var(--sub); margin-top:14px; line-height:1.5; max-width:520px;}

  /* number line for deai */
  .line{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; width:100%; max-width:580px; margin:6px auto 10px;}
  .lt{position:relative; width:50px; height:64px; border-radius:14px; background:var(--card); box-shadow:var(--shadow);
    display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px; font-weight:800; font-size:18px; cursor:pointer; transition:transform .08s;}
  .lt:active{transform:scale(.92);}
  .lt .dotrow{position:absolute; top:5px; left:0; right:0; display:flex; gap:3px; justify-content:center;}
  .lt .d{width:9px; height:9px; border-radius:50%;}
  .lt.hit{background:var(--yellow); animation:sg .35s;}
  .lt.miss{background:#ff6b6b; color:#fff; animation:sb .35s;}

  .big{font-size:22px; font-weight:800; margin:6px 0;}
  .confetti{position:fixed; top:-20px; font-size:22px; pointer-events:none; z-index:60; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(360deg);}}

  /* featured 九九 card */
  .feat{grid-column:1 / -1; background:linear-gradient(135deg,#fff,#ffe9d2); position:relative;}
  .feat .zic{font-size:40px;}
  .feat .prog{display:flex; gap:5px; justify-content:center; margin-top:8px; flex-wrap:wrap;}
  .feat .pdot{width:16px; height:16px; border-radius:50%; background:#eadbc8; font-size:11px; display:flex; align-items:center; justify-content:center;}
  .feat .pdot.m{background:var(--green);}

  /* 九九 dot scaffold */
  .dotsviz{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:560px; margin:6px auto 14px;}
  .dotgrp{display:flex; gap:3px; padding:7px 9px; background:#fff; border-radius:12px; box-shadow:var(--shadow);}
  .dotgrp .pt{width:13px; height:13px; border-radius:50%; background:var(--orange);}
  .countup{font-size:15px; color:var(--sub); margin:-6px 0 12px;}

  /* dan map */
  .danrow{display:flex; align-items:center; gap:12px; background:var(--card); border-radius:18px; padding:12px 14px; margin:9px 0; box-shadow:var(--shadow);}
  .danrow.locked{opacity:.5;}
  .danrow.cur{outline:4px solid var(--pink);}
  .danrow .dnum{width:50px; height:50px; border-radius:14px; background:var(--purple); color:#fff; font-weight:800; font-size:18px; display:flex; align-items:center; justify-content:center; flex:none;}
  .danrow.mastered .dnum{background:var(--green);}
  .danrow.locked .dnum{background:#bbb;}
  .danrow .dinfo{flex:1; text-align:left;}
  .danrow .dname{font-weight:800; font-size:17px;}
  .danrow .dsteps{display:flex; gap:5px; margin-top:5px;}
  .danrow .s{width:30px; height:10px; border-radius:999px; background:#eadbc8;}
  .danrow .s.on{background:var(--yellow);}
  .danrow .sticker{font-size:30px;}
  .danrow .play{border:0; border-radius:999px; padding:10px 16px; font-weight:800; color:#fff; background:var(--orange); font-family:inherit; font-size:15px;}
  .danrow.locked .play{background:#bbb;}

  /* zukan */
  .zukan{display:grid; grid-template-columns:repeat(auto-fill,minmax(92px,1fr)); gap:12px; width:100%; max-width:560px; margin:10px auto;}
  .zcell{background:var(--card); border-radius:18px; padding:14px 6px; box-shadow:var(--shadow); text-align:center;}
  .zcell .ze{font-size:38px; line-height:1;}
  .zcell .zl{font-size:13px; font-weight:800; margin-top:6px;}
  .zcell.locked{background:#f0e8dc;}
  .zcell.locked .ze{filter:grayscale(1); opacity:.35;}
  .zcell.locked .zl{color:#b9a890;}
  .zsec{font-weight:800; font-size:15px; color:var(--sub); margin:16px 4px 2px; text-align:left;}
</style>
</head>
<body>
<!-- シャチ用の共通グラデーション（写実的な陰影） -->
<svg width="0" height="0" aria-hidden="true" style="position:absolute"><defs>
  <linearGradient id="oBody" x1="0" y1="0" x2="0.15" y2="1">
    <stop offset="0" stop-color="#3a4a5b"/><stop offset=".25" stop-color="#222e3b"/>
    <stop offset=".7" stop-color="#141c25"/><stop offset="1" stop-color="#080c12"/>
  </linearGradient>
  <linearGradient id="oBelly" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#c4d0da"/>
  </linearGradient>
  <linearGradient id="oSaddle" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#8a98a8"/><stop offset="1" stop-color="#54616e"/>
  </linearGradient>
  <linearGradient id="oFin" x1="0" y1="0" x2="0.3" y2="1">
    <stop offset="0" stop-color="#2a3744"/><stop offset="1" stop-color="#070b10"/>
  </linearGradient>
  <radialGradient id="oGloss" cx=".5" cy=".5" r=".5">
    <stop offset="0" stop-color="#cfe0ee" stop-opacity=".55"/><stop offset="1" stop-color="#cfe0ee" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="oAura" cx=".5" cy=".5" r=".5">
    <stop offset="0" stop-color="#fff3c0" stop-opacity="0"/>
    <stop offset=".58" stop-color="#ffe79a" stop-opacity="0"/>
    <stop offset=".72" stop-color="#ffdc7a" stop-opacity=".7"/>
    <stop offset=".85" stop-color="#ffce53" stop-opacity=".35"/>
    <stop offset="1" stop-color="#ffce53" stop-opacity="0"/>
  </radialGradient>
</defs></svg>
<div id="app">

  <!-- HOME -->
  <section class="screen on" id="s-home">
    <div class="hud">
      <span class="pillstat lv">Lv.<span id="hLv">1</span></span>
      <span class="pillstat" style="color:#e85d2a">🔥 <span id="hStreak">0</span></span>
      <span class="pillstat st">⭐ <span id="hStar">0</span></span>
    </div>
    <svg class="zen bob" style="width:120px;height:120px" viewBox="0 0 120 130" id="zenHome"></svg>
    <h1>然BOY おもしろ算数</h1>
    <p class="tag" id="homeTag">あそぶ ゾーンを えらんでね</p>
    <div class="zones" id="zones"></div>
    <button class="btn ghost sm" onclick="resetAll()" style="margin-top:18px; opacity:.6; font-size:14px">🔄 さいしょから（記録を消す）</button>
  </section>

  <!-- DIAGNOSTIC QUIZ -->
  <section class="screen" id="s-quiz">
    <div class="top">
      <span class="stagepill" id="pill">九九</span>
      <div class="bar"><div class="fill" id="fill"></div></div>
    </div>
    <svg class="zen" style="width:80px;height:80px" viewBox="0 0 120 130" id="zenSmall"></svg>
    <div class="q" id="q">7 × 8</div>
    <p class="qhint" id="hint"></p>
    <div class="opts" id="opts"></div>
  </section>

  <!-- DIAGNOSTIC RESULT -->
  <section class="screen" id="s-result">
    <svg class="zen bob" style="width:100px;height:100px" viewBox="0 0 120 130" id="zenResult"></svg>
    <h1 style="font-size:23px">しんだん 結果！</h1>
    <div class="speech" id="verdict" style="margin-bottom:14px"></div>
    <div class="map" id="map"></div>
    <div>
      <button class="btn" id="goRec">おすすめの 練習へ →</button>
      <button class="btn ghost" onclick="go('s-home')">ホームへ</button>
    </div>
    <p class="small" id="parent"></p>
  </section>

  <!-- GENERIC GAME -->
  <section class="screen" id="s-game">
    <div class="hud">
      <button class="btn ghost sm" onclick="quitGame()">← もどる</button>
      <span class="pillstat st">⭐ <span id="gStar">0</span></span>
      <span class="lives" id="gLives"></span>
    </div>
    <div class="stagepill" id="gTitle" style="margin:4px 0">九九ダッシュ</div>
    <div class="top" style="margin-top:6px"><div class="bar"><div class="fill" id="gFill"></div></div></div>
    <p class="streak" id="gStreak"></p>
    <div class="q" id="gQ" style="min-height:auto"></div>
    <p class="qhint" id="gHint"></p>
    <div id="gBody" style="width:100%; display:flex; flex-direction:column; align-items:center"></div>
  </section>

  <!-- WIN -->
  <section class="screen" id="s-win">
    <svg class="zen bob" style="width:120px;height:120px" viewBox="0 0 120 130" id="zenWin"></svg>
    <h1 id="winHead">クリア！</h1>
    <div class="speech" id="winMsg"></div>
    <div class="big" id="winStars"></div>
    <div id="winLevelUp" class="big" style="color:var(--purple)"></div>
    <div>
      <button class="btn" id="winAgain">もう一度</button>
      <button class="btn ghost" id="winHome" onclick="go('s-home')">ホームへ</button>
    </div>
  </section>

  <!-- 九九とっくん MAP -->
  <section class="screen" id="s-kukumap">
    <div class="hud">
      <button class="btn ghost sm" onclick="go('s-home')">← ホーム</button>
      <span class="pillstat" style="color:#e85d2a">🔥 <span id="kmStreak">0</span></span>
      <span class="pillstat st">⭐ <span id="kmStar">0</span></span>
    </div>
    <h1 style="font-size:22px">九九とっくん</h1>
    <p class="tag" id="kmTag">ひかっている 段から はじめよう！</p>
    <div id="danmap" style="width:100%; max-width:540px"></div>
    <button class="btn ghost sm" onclick="renderZukan();go('s-zukan')">📔 ずかんを みる</button>
  </section>

  <!-- 段 SESSION -->
  <section class="screen" id="s-dan">
    <div class="hud">
      <button class="btn ghost sm" onclick="go('s-kukumap')">← もどる</button>
      <span class="stagepill" id="danTitle">2の段</span>
      <span class="pillstat st">⭐ <span id="danStar">0</span></span>
    </div>
    <div class="stagepill" id="danStepName" style="background:var(--green); margin:6px 0">Step1 見て覚える</div>
    <div class="top"><div class="bar"><div class="fill" id="danFill"></div></div></div>
    <div class="q" id="danQ" style="min-height:auto"></div>
    <p class="qhint" id="danHint"></p>
    <div id="danBody" style="width:100%; display:flex; flex-direction:column; align-items:center"></div>
  </section>

  <!-- ずかん -->
  <section class="screen" id="s-zukan">
    <div class="hud">
      <button class="btn ghost sm" onclick="go('s-kukumap')">← もどる</button>
      <span class="pillstat">📔 ずかん</span>
      <span></span>
    </div>
    <h1 style="font-size:22px">ずかん</h1>
    <p class="tag" id="zukanTag">あつめた シール</p>
    <div id="zukanGrid" style="width:100%; max-width:560px"></div>
  </section>

</div>

<script>
/* ============ Zenboy ============ */
/* 子どものシャチ（横向き・写実寄り。陰影グラデーション＋正しい模様）。
   レベルで成長: 1=こども(背びれ低い)→2→3(キラキラ)→4(背びれが伸びて王冠) */
function zenboy(level){
  level=level||1;
  const stage = level>=10?5 : level>=7?4 : level>=5?3 : level>=3?2 : 1;
  const S      = [0,0.86,0.93,1.0,1.06,1.1][stage];  // 成長スケール
  const finTop = [0,30,22,13,6,2][stage];            // 背びれ先端の高さ(小さいほど高い)
  // 王冠は頭(おでこ)の上に。レベルが上がるほど最大5個まで積み重なる(Lv7で1個、3Lvごとに+1)
  const crowns = level<7 ? 0 : Math.min(5, Math.floor((level-7)/3)+1);
  const cu=(cx,by,gem)=>`<path d="M${cx-8} ${by} L${cx-5} ${by-8} L${cx-2.5} ${by-3} L${cx} ${by-11} L${cx+2.5} ${by-3} L${cx+5} ${by-8} L${cx+8} ${by} Z" fill="#ffd640" stroke="#e8920a" stroke-width="1.2"/>`+(gem?`<circle cx="${cx}" cy="${by-4.5}" r="1.7" fill="#ff5a7a" stroke="#d23b5c" stroke-width=".6"/>`:'');
  // 頭から後ろ(尾の方)へ一列に並べる。奥(後ろ)から描いて頭側を手前に
  let crown=''; for(let i=crowns-1;i>=0;i--) crown+=cu(92-i*13, 43+i*1.4, i===0 && crowns>=2);
  const aura = stage>=5 ? '<circle cx="58" cy="58" r="60" fill="url(#oAura)"/>' : '';
  const sparkle = stage>=5
    ? '<text x="4" y="34" font-size="16">✨</text><text x="98" y="38" font-size="15">✨</text><text x="16" y="92" font-size="13">✨</text><text x="92" y="96" font-size="13">✨</text>'
    : stage>=3 ? '<text x="8" y="34" font-size="14">✨</text><text x="98" y="42" font-size="12">✨</text>' : '';
  const baby = stage===1 ? '<text x="100" y="38" font-size="12">💧</text>' : '';
  const body = `
    <ellipse cx="60" cy="115" rx="42" ry="6" fill="rgba(20,35,55,.16)"/>
    <!-- 尾びれ -->
    <path d="M17 60 C10 55 5 51 1 49 C6 56 9 60 12 63 C9 67 6 73 1 82 C7 76 12 70 17 67 Z"
      fill="url(#oFin)"/>
    <!-- 体 -->
    <path d="M115 61
      C113 51 107 46 99 45 C86 42 73 43 64 44
      L57 ${finTop} L48 46
      C37 48 27 52 18 59 C14 61 12 62 11 64
      C16 70 24 74 34 76 C48 79 64 80 80 77
      C95 74 107 69 115 61 Z" fill="url(#oBody)"/>
    <!-- 背中のツヤ -->
    <ellipse cx="74" cy="52" rx="30" ry="11" fill="url(#oGloss)" transform="rotate(-9 74 52)"/>
    <!-- 灰色サドルパッチ -->
    <ellipse cx="40" cy="53" rx="13" ry="5" fill="url(#oSaddle)" opacity=".92" transform="rotate(-10 40 53)"/>
    <!-- 白いお腹 -->

/* ============ helpers ============ */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function opts4(correct,pool){const set=new Set([correct]);let g=0;while(set.size<4&&g++<99){const c=pool();if(c!==correct)set.add(c);}return shuffle([...set]);}
function gcd(a,b){return b?gcd(b,a%b):a;}
/* くじ引き(バッグ)方式: プールをシャッフルして1つずつ取り出す。
   全部出るまで同じ問題は出ない。空になったら混ぜ直し、つなぎ目の重複も避ける。 */
function _sig(v){return JSON.stringify(v);}
const _bag={};
function bagPick(key,pool){
  let b=_bag[key];
  if(!b||!b.items.length){
    const items=shuffle(pool.slice());
    if(b&&b.last!==undefined&&items.length>1&&_sig(items[items.length-1])===_sig(b.last)){
      const t=items[0];items[0]=items[items.length-1];items[items.length-1]=t;}
    b=_bag[key]={items,last:b?b.last:undefined};
  }
  const v=b.items.pop(); b.last=v; return v;
}
/* 問題プール */
const KUKU_POOL=(()=>{const p=[];for(let a=2;a<=9;a++)for(let b=2;b<=9;b++)p.push({a,b});return p;})();
const BAISU_NS=[3,4,6,7];
const YAKUSU_NS=[12,16,18,20,24];
const LCM_PAIRS=[[2,3],[4,6],[3,4],[4,5],[6,8],[6,9]];
const GCD_PAIRS=[[12,18],[8,12],[9,15],[16,24],[10,15],[6,9]];
const BAISU_DIAG=(()=>{const p=[];for(const n of BAISU_NS)for(let k=2;k<=8;k++)p.push({n,k});return p;})();
const YAKUSU_SETS=[[12,[1,2,3,4,6,12]],[18,[1,2,3,6,9,18]],[24,[1,2,3,4,6,8,12,24]],[16,[1,2,4,8,16]],[20,[1,2,4,5,10,20]]];

/* ============ DIAGNOSTIC ============ */
const STAGES=[
  {key:'kuku', name:'九九', icon:'✖️', color:'var(--purple)', slow:3500, pool:KUKU_POOL,
   make(x){const a=x.a,b=x.b,ans=a*b;
     return{q:`${a} × ${b}`,hint:'答えは？',ans,opts:opts4(ans,()=>(2+Math.random()*8|0)*(2+Math.random()*8|0))};}},
  {key:'baisu', name:'倍数', icon:'🐸', color:'var(--green)', slow:6000, pool:BAISU_DIAG,
   make(x){const n=x.n,k=x.k,ans=n*k;
     return{q:`${n} の 倍数は どれ？`,hint:`${n}を 何こか あつめた 数`,ans,
       opts:opts4(ans,()=>{let v;do{v=2+Math.random()*40|0;}while(v%n===0);return v;})};}},
  {key:'yakusu', name:'約数', icon:'🍪', color:'var(--yellow)', slow:7000, pool:YAKUSU_SETS,
   make(x){const n=x[0],divs=x[1]; const ans=divs[1+Math.random()*(divs.length-2)|0];
     return{q:`クッキー ${n}こを あまりなく 配れる 人数は？`,hint:`${n}を わりきれる 数`,ans,
       opts:opts4(ans,()=>{let v;do{v=2+Math.random()*(n-1)|0;}while(n%v===0);return v;})};}},
  {key:'deai', name:'最小公倍数', icon:'🤝', color:'var(--pink)', slow:9000, pool:LCM_PAIRS,
   make(x){const a=x[0],b=x[1],ans=a*b/gcd(a,b);
     return{q:`${a} と ${b} が はじめて であう 数は？`,hint:`どちらの 倍数にも なる 一番 小さい 数`,ans,
       opts:opts4(ans,()=>{const m=[a,b][Math.random()<.5?0:1];return m*(1+Math.random()*5|0);})};}},
];
const QN_PER_STAGE=[3,2,2,3];
let plan=[], idx=0, t0=0, dres={};
function startDiag(){
  touchStreak(); updateStreakUI();
  plan=[]; STAGES.forEach((s,i)=>{for(let k=0;k<QN_PER_STAGE[i];k++)plan.push(i);});
  idx=0; dres={}; STAGES.forEach(s=>dres[s.key]={c:0,n:0,slow:0});
  document.getElementById('zenSmall').innerHTML=zenboy(save.level);
  go('s-quiz'); nextDiag();
}
function nextDiag(){
  if(idx>=plan.length)return finishDiag();
  const stage=STAGES[plan[idx]]; const item=stage.make(bagPick('d-'+stage.key,stage.pool)); item._stage=stage;
  document.getElementById('fill').style.width=(idx/plan.length*100)+'%';
  const pill=document.getElementById('pill'); pill.textContent=stage.name; pill.style.background=stage.color;
  document.getElementById('q').textContent=item.q;
  document.getElementById('hint').textContent=item.hint;
  const box=document.getElementById('opts'); box.innerHTML='';
  item.opts.forEach(v=>{const b=document.createElement('button');b.className='opt';b.textContent=v;
    b.onclick=()=>answerDiag(b,v,item);box.appendChild(b);});
  t0=performance.now();
}
function answerDiag(btn,val,item){
  const dt=performance.now()-t0, stage=item._stage, r=dres[stage.key]; r.n++;
  document.querySelectorAll('#opts .opt').forEach(b=>b.onclick=null);
  if(val===item.ans){r.c++; if(dt>stage.slow)r.slow++; btn.classList.add('good'); sGood(); burst(btn, dt>stage.slow?'🐢':'⭐');}
  else{btn.classList.add('bad'); sBad(); document.querySelectorAll('#opts .opt').forEach(b=>{if(+b.textContent===item.ans)b.classList.add('good');});}
  if(stage.key==='kuku'){const m=item.q.match(/(\d+)\s*×\s*(\d+)/); if(m)recordKuku(+m[1],+m[2],val===item.ans,dt<stage.slow);}
  idx++; setTimeout(nextDiag, val===item.ans?600:1100);
}
function finishDiag(){
  document.getElementById('fill').style.width='100%';
  let weakest=null, weakScore=2;
  const rows=STAGES.map(s=>{const r=dres[s.key]; const acc=r.n?r.c/r.n:1; const speed=r.c?1-(r.slow/r.c):1;
    const score=acc*0.7+speed*0.3; if(score<weakScore){weakScore=score; weakest=s;} return {s,r,acc,speed,score};});
  const map=document.getElementById('map'); map.innerHTML='';
  rows.forEach(({s,r,score})=>{const pct=Math.round(score*100);
    const col=score>=.8?'var(--green)':score>=.5?'var(--yellow)':'#ff6b6b';
    const slowNote=r.slow>0?` ・ちょっと ゆっくり🐢×${r.slow}`:'';
    const node=document.createElement('div'); node.className='node'+(s===weakest?' start':'');
    node.innerHTML=`<div class="ic">${s.icon}</div><div style="flex:1">
      <div class="nm">${s.name}</div><div class="sc">正解 ${r.c}/${r.n}${slowNote}</div>
      <div class="meter"><i style="width:${pct}%;background:${col}"></i></div></div>`;
    map.appendChild(node);});
  const advice={
    kuku:'まずは <b>九九</b> を「考えずに パッと言える」ように するのが 近道！',
    baisu:'<b>倍数</b>の イメージから。カエルの ジャンプで「3とび・4とび」を 体で おぼえよう。',
    yakusu:'<b>約数</b>が カギ。クッキーを「あまりなく 配る」あそびで かんかくを つけよう。',
    deai:'土台は バッチリ！あとは <b>公倍数・公約数</b> の「出会い」を 練習すれば 完成。',
  };
  const total=rows.reduce((a,b)=>a+b.score,0)/rows.length;
  const head= total>=.85?'すごい！かなり 力が ついてるね。' : total>=.6?'いい感じ！あと 少し！' : 'だいじょうぶ、ここから いっしょに レベルアップ！';
  document.getElementById('verdict').innerHTML=`${head}<br>きみの <b>スタート地点</b> は…<br>「${weakest.icon} ${weakest.name==='最小公倍数'?'ふたりのカエル':weakest.name}」だ！<br><span style="font-size:15px">${advice[weakest.key]}</span>`;
  const detail=rows.map(r=>`${r.s.name} ${Math.round(r.score*100)}%(正${r.r.c}/${r.r.n}${r.r.slow?` 遅${r.r.slow}`:''})`).join(' ／ ');
  document.getElementById('parent').textContent='【保護者メモ】'+detail+' ／ 推奨スタート: '+weakest.name;
  save.diag={start:weakest.key, date:Date.now()}; const up=addStars(3); persist();
  document.getElementById('zenResult').innerHTML=zenboy(save.level);
  document.getElementById('goRec').onclick=()=>startZone(weakest.key);
  sWin(); go('s-result');
}

/* ---- ふたりのカエル（公倍数・公約数）---- */
function playDeai(){
  go('s-game');
  document.getElementById('gTitle').textContent='🤝 ふたりのカエル';
  const rounds=[makeLCM(), makeGCD()]; let ri=0, stars=0;
  setHUD(0,0,0);
  function run(){
    if(ri>=rounds.length){gameWin('deai',stars,'ふたりのカエル クリア！','公倍数も 公約数も バッチリ！');return;}
    document.getElementById('gFill').style.width=(ri/rounds.length*100)+'%';
    const R=rounds[ri]; document.getElementById('gStreak').textContent=`もんだい ${ri+1} / ${rounds.length}`;
    document.getElementById('gQ').innerHTML=R.q;
    document.getElementById('gHint').textContent=R.hint;
    const body=document.getElementById('gBody'); body.innerHTML='<div class="line" id="dLine"></div>';
    const line=document.getElementById('dLine');
    for(let v=1;v<=R.max;v++){const t=document.createElement('div'); t.className='lt';
      let dots=''; if(R.dots){ if(v%R.a===0)dots+='<span class="d" style="background:var(--green)"></span>';
        if(R.b&&v%R.b===0)dots+='<span class="d" style="background:var(--blue)"></span>'; }
      t.innerHTML=`<div class="dotrow">${dots}</div>${v}`;
      t.onclick=()=>{
        if(t.classList.contains('hit'))return;
        if(v===R.ans){t.classList.add('hit'); sGood(); sStar(); burst(t,'🤝');
          stars+=2; setHUD(stars,0,0); ri++; setTimeout(run,800);}
        else{t.classList.add('miss'); sBad(); setTimeout(()=>t.classList.remove('miss'),450);}
      };
      line.appendChild(t);}
  }
  run();
}
function makeLCM(){
  const [a,b]=bagPick('lcm',LCM_PAIRS);
  const ans=a*b/gcd(a,b);
  return{a,b,ans,max:Math.min(ans+ (ans<14?6:2),24),dots:true,
    q:`🐸<span style="color:var(--green)">${a}とび</span> と 🐸<span style="color:var(--blue)">${b}とび</span><br>はじめて 出会う 数は？`,
    hint:'みどりと あおの 点が そろう 一番小さい 数 ＝ 最小公倍数'};
}
function makeGCD(){
  const [a,b]=bagPick('gcd',GCD_PAIRS);
  const ans=gcd(a,b);
  return{a,b,ans,max:Math.min(a,b),dots:false,
    q:`クッキー ${a}こと ${b}こ<br>おなじ数ずつ 分けられる 一番大きい 人数は？`,
    hint:`${a}も ${b}も わりきれる 一番大きい 数 ＝ 最大公約数`};
}

/* ============ にがて たいじ（苦手の集中復習）============ */
function startWeak(){
  touchStreak(); updateStreakUI();
  const keys=Object.keys(save.weak);
  if(!keys.length)return showWeakEmpty();
  go('s-game');
  document.getElementById('gTitle').textContent='🎯 にがて たいじ';
  document.getElementById('gStreak').textContent='';
  setHUD(0,0,0);
  const startCount=keys.length; let stars=0, done=0; const maxQ=12;
  function pick(){
    const ks=Object.keys(save.weak).sort((a,b)=>save.weak[b]-save.weak[a]); // 苦手度が高い順
    const top=ks.slice(0,Math.min(3,ks.length));
    return top[Math.random()*top.length|0];
  }
  (function q(){
    const left=weakCount();
    if(left===0)return weakDone(startCount,0,stars);
    if(done>=maxQ)return weakDone(startCount,left,stars);
    document.getElementById('gFill').style.width=((startCount-left)/startCount*100)+'%';
    document.getElementById('gHint').textContent=`のこり にがて ${left}こ`;
    const key=pick(), n=+key.split('x')[0], k=+key.split('x')[1], ans=n*k;
    document.getElementById('gQ').textContent=`${n} × ${k}`;
    document.getElementById('gBody').innerHTML='<div class="opts" id="wOpts"></div>';
    const box=document.getElementById('wOpts');
    opts4(ans,()=>n*(1+Math.random()*9|0)).forEach(v=>{
      const btn=document.createElement('button'); btn.className='opt'; btn.textContent=v;
      btn.onclick=()=>{document.querySelectorAll('#wOpts .opt').forEach(x=>x.onclick=null);
        if(v===ans){recordKuku(n,k,true,false); stars++; setHUD(stars,0,0); btn.classList.add('good'); sGood(); sStar();
          burst(btn, save.weak[key]===undefined?'🎉':'⭐');}
        else{recordKuku(n,k,false,false); btn.classList.add('bad'); sBad();
          document.querySelectorAll('#wOpts .opt').forEach(x=>{if(+x.textContent===ans)x.classList.add('good');});}
        done++; setTimeout(q,650);};
      box.appendChild(btn);});
  })();
}
function weakDone(startCount,left,stars){
  const up=addStars(stars); persist();
  document.getElementById('zenWin').innerHTML=zenboy(save.level);
  document.getElementById('winHead').textContent= left===0?'にがて ぜんぶ たいじ！':'にがて たいじ おわり！';
  const cleared=startCount-left;
  document.getElementById('winMsg').innerHTML= cleared>0?`にがてが <b>${startCount} → ${left}</b> こに へった！`:'また ちょうせんしよう！';
  document.getElementById('winStars').innerHTML=`⭐ ${stars}こ ゲット！　ぜんぶで ⭐${save.stars}`;
  document.getElementById('winLevelUp').textContent= up?`🎉 レベルアップ！ Lv.${save.level}！`:(left===0?'🏆 にがてが ゼロに なった！':'');
  const again=document.getElementById('winAgain');
  if(left>0){ again.style.display=''; again.textContent='もう一回'; again.onclick=()=>startWeak(); }
  else { again.style.display='none'; award('a_noweak'); } // 苦手ゼロ → ホームボタンだけ
  sWin(); confetti(); go('s-win');
}
function showWeakEmpty(){

/* ============ 九九タイムアタック（60秒で何問）============ */
function playTimeAttack(){
  touchStreak(); updateStreakUI();
  go('s-game');
  document.getElementById('gTitle').textContent='⏱️ 九九タイムアタック';
  document.getElementById('gLives').textContent='';
  document.getElementById('gHint').textContent='2ふんで なんもん とけるかな？';
  const T=120000; let timeLeft=T, score=0, last=performance.now(), ended=false;
  setHUD(0,0,0);
  clearInterval(window.taTimer);
  window.taTimer=setInterval(()=>{
    const now=performance.now(); timeLeft-=(now-last); last=now;
    if(timeLeft<=0){ timeLeft=0; document.getElementById('gFill').style.width='0%'; endTA(); return; }
    document.getElementById('gFill').style.width=(timeLeft/T*100)+'%';
    const sec=Math.ceil(timeLeft/1000);
    const disp = sec>=60 ? `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}` : sec+'びょう';
    document.getElementById('gStreak').textContent='⏱️ のこり '+disp;
    document.getElementById('gStreak').style.color = sec<=10?'#e8540a':'var(--orange)';
  },100);
  function q(){
    if(ended)return;
    const Q=bagPick('ta',KUKU_POOL), a=Q.a, b=Q.b, ans=a*b;
    document.getElementById('gQ').textContent=`${a} × ${b}`;
    document.getElementById('gBody').innerHTML='<div class="opts" id="tOpts"></div>';
    const box=document.getElementById('tOpts');
    opts4(ans,()=>(2+Math.random()*8|0)*(2+Math.random()*8|0)).forEach(v=>{
      const btn=document.createElement('button'); btn.className='opt'; btn.textContent=v;
      btn.onclick=()=>{ if(ended)return;
        document.querySelectorAll('#tOpts .opt').forEach(x=>x.onclick=null);
        if(v===ans){score++; setHUD(score,0,0); btn.classList.add('good'); sGood(); sStar(); recordKuku(a,b,true,true);}
        else{btn.classList.add('bad'); sBad(); document.querySelectorAll('#tOpts .opt').forEach(x=>{if(+x.textContent===ans)x.classList.add('good');}); recordKuku(a,b,false,false);}
        setTimeout(q, v===ans?240:560);
      };
      box.appendChild(btn);});
  }
  function endTA(){
    if(ended)return; ended=true; clearInterval(window.taTimer);
    const newRec = score>(save.taBest||0); if(newRec)save.taBest=score;
    const stars=Math.max(1,Math.round(score/3))+(newRec?3:0);
    const up=addStars(stars); persist();
    document.getElementById('zenWin').innerHTML=zenboy(save.level);
    document.getElementById('winHead').textContent= newRec?'🎉 新記録！':'タイムアップ！';
    document.getElementById('winMsg').innerHTML=`2ふんで <b>${score}もん</b> 正解！`+(newRec?'<br>さいこう記録 こうしん！':`<br>さいこう記録は ${save.taBest}もん`);
    document.getElementById('winStars').innerHTML=`⭐ ${stars}こ ゲット！　ぜんぶで ⭐${save.stars}`;
    document.getElementById('winLevelUp').textContent= up?`🎉 レベルアップ！ Lv.${save.level}！`:'';
    const again=document.getElementById('winAgain'); again.style.display=''; again.textContent='もう一度'; again.onclick=()=>playTimeAttack();
    sWin(); confetti(); go('s-win');
  }
  q();
}

/* ============ boot ============ */
checkAchievements(); // 既存の進捗にも達成シールを反映
renderHome();

/* offline + 自動更新: 新しい版が出たら自動で読み込み直す */
if('serviceWorker' in navigator){
  let _reloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(_reloaded)return; _reloaded=true; location.reload();
  });
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{ try{reg.update();}catch(e){} }).catch(()=>{});
  });
}
</script>
